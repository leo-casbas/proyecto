<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM VICTORIA 103.3</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .id-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; color: #007bff; border: 2px dashed #007bff; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 8px; font-size: 16px; width: 100%; margin-bottom: 10px; color: white; background: #007bff; }
        .btn-call { background: #28a745; }
        #error-log { color: #dc3545; background: #f8d7da; padding: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>FM VICTORIA 103.3</h2>
    
    <div id="setup">
        <button onclick="activarMicofono()">INICIAR SISTEMA</button>
    </div>

    <div id="panel" style="display:none;">
        <p>Tu ID:</p>
        <div class="id-box" id="my-id">CONECTANDO...</div>
        <input type="text" id="peer-id" placeholder="ID destino" style="width:90%; padding:10px; margin-bottom:10px;">
        <button class="btn-call" onclick="realizarLlamada()">LLAMAR</button>
    </div>

    <div id="error-log"></div>
    <div id="audios"></div>
</div>

<!-- CARGA DE LA LIBRERÍA PEERJS CORRECTA -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<!-- TU SCRIPT -->
<script src="script.js"></script>

</body>
</html>
