<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub P2P de Audio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #007bff; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 25px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; transition: 0.3s; width: 100%; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; background: #e9ecef; }
        .audio-list { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .my-id-box { background: #d4edda; padding: 10px; border-radius: 5px; margin: 10px 0; font-family: monospace; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hub de Audio P2P</h2>
    
    <div id="setup-step">
        <p>Para comenzar, habilita tu micrófono:</p>
        <button onclick="activarMicofono()">Activar Micrófono</button>
    </div>

    <div id="main-step" style="display:none;">
        <p>Tu ID para compartir:</p>
        <div class="my-id-box" id="my-id">Generando...</div>

        <input type="text" id="remote-id" placeholder="ID del amigo a llamar">
        <button onclick="makeCall()">Llamar ahora</button>
        
        <div id="status">Conectado a la red</div>
        <div class="audio-list" id="audios"></div>
    </div>
</div>

<!-- LIBRERÍA CORRECTA -->
<script src="https://unpkg.com"></script>

<script>
    const statusDiv = document.getElementById('status');
    const audioContainer = document.getElementById('audios');
    let localStream;
    let peer;

    // PASO 1: Activar Micrófono tras clic (Requerido por móviles)
    async function activarMicofono() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('setup-step').style.display = 'none';
            document.getElementById('main-step').style.display = 'block';
            inicializarPeer();
        } catch (err) {
            alert("No se pudo acceder al micrófono: " + err);
        }
    }

    // PASO 2: Conectar a PeerJS
    function inicializarPeer() {
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // Escuchar llamadas entrantes
        peer.on('call', (call) => {
            statusDiv.innerText = "¡Llamada entrante!";
            call.answer(localStream);
            gestionarStream(call);
        });

        peer.on('error', (err) => {
            statusDiv.innerText = "Error: " + err.type;
            console.error(err);
        });
    }

    // PASO 3: Realizar llamada
    function makeCall() {
        const rId = document.getElementById('remote-id').value;
        if (!rId) return alert("Ingresa un ID");
        
        statusDiv.innerText = "Llamando a " + rId + "...";
        const call = peer.call(rId, localStream);
        gestionarStream(call);
    }

    // PASO 4: Mostrar el audio en la pantalla
    function gestionarStream(call) {
        call.on('stream', (remoteStream) => {
            if (document.getElementById("audio-" + call.peer)) return;

            const audio = document.createElement('audio');
            audio.id = "audio-" + call.peer;
            audio.srcObject = remoteStream;
            audio.autoplay = true;
            audio.controls = true;
            audio.setAttribute('playsinline', 'true'); // Para iPhone
            
            audioContainer.appendChild(audio);
            statusDiv.innerText = "En llamada con: " + call.peer;
        });
    }
</script>
</body>
</html>
