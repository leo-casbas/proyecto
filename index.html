<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub P2P Audio</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eceff1; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:disabled { background: #ccc; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 80%; }
        #status { color: #d32f2f; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Hub de Audio P2P</h2>
    
    <!-- PASO 1: Activar Micrófono -->
    <div id="setup">
        <p>Primero, activa tu micrófono:</p>
        <button id="btn-mic">Permitir Micrófono</button>
    </div>

    <!-- PASO 2: Panel de Conexión (oculto al inicio) -->
    <div id="call-panel" style="display:none;">
        <p>Tu ID: <strong id="my-id">Generando...</strong></p>
        <input type="text" id="remote-id" placeholder="ID de la otra persona">
        <button id="btn-call">Llamar</button>
    </div>

    <div id="status">Esperando micrófono...</div>
    <div id="audios"></div>
</div>

<!-- LIBRERÍA CON HTTPS (Crítico para GitHub) -->
<script src="https://unpkg.com"></script>

<script>
    const btnMic = document.getElementById('btn-mic');
    const btnCall = document.getElementById('btn-call');
    const status = document.getElementById('status');
    const myIdDisplay = document.getElementById('my-id');
    let localStream;
    let peer;

    // 1. ACTIVAR MICRÓFONO Y LUEGO INICIAR PEER
    btnMic.onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            status.innerText = "Micrófono activo. Conectando...";
            btnMic.disabled = true;
            iniciarPeer();
        } catch (err) {
            status.innerText = "Error: No se pudo acceder al micrófono.";
            console.error(err);
        }
    };

    function iniciarPeer() {
        // Inicializa PeerJS
        peer = new Peer();

        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            status.innerText = "Listo para hablar";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('call-panel').style.display = 'block';
        });

        peer.on('error', (err) => {
            status.innerText = "Error de conexión: " + err.type;
        });

        // ESCUCHAR LLAMADA ENTRANTE
        peer.on('call', (call) => {
            status.innerText = "Recibiendo audio...";
            call.answer(localStream);
            gestionarStream(call);
        });
    }

    // 2. REALIZAR LLAMADA
    btnCall.onclick = () => {
        const remoteId = document.getElementById('remote-id').value;
        if (!remoteId) return alert("Pon un ID");
        
        status.innerText = "Llamando...";
        const call = peer.call(remoteId, localStream);
        gestionarStream(call);
    };

    function gestionarStream(call) {
        call.on('stream', (remoteStream) => {
            // Crear el audio solo si no existe
            if (!document.getElementById("audio-" + call.peer)) {
                const audio = document.createElement('audio');
                audio.id = "audio-" + call.peer;
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                audio.controls = true;
                // Importante para móviles
                audio.setAttribute('playsinline', 'true');
                document.getElementById('audios').appendChild(audio);
                status.innerText = "Conversando con: " + call.peer;
            }
        });
    }
</script>
</body>
</html>
