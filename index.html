<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM VICTORIA - Finalizar Llamada</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .my-id-box { background: #e7f3ff; padding: 10px; border-radius: 5px; margin: 15px 0; font-weight: bold; color: #007bff; border: 1px dashed #007bff; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-size: 16px; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-call { background: #28a745; color: white; }
        .btn-hangup { background: #dc3545; color: white; display: none; } /* Oculto hasta que haya llamada */
        .btn-mic { background: #007bff; color: white; }
        #status { margin-top: 15px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hub de Audio P2P</h2>
    
    <!-- PASO 1: Activar Micrófono -->
    <div id="setup-step">
        <p>Haz clic para iniciar el sistema:</p>
        <button class="btn-mic" onclick="activarMicofono()">Activar Micrófono</button>
    </div>

    <!-- PASO 2: Panel de Control -->
    <div id="main-step" style="display:none;">
        <p>Tu ID de conexión:</p>
        <div class="my-id-box" id="my-id">Generando...</div>

        <input type="text" id="remote-id" placeholder="ID de la otra persona">
        
        <button id="btn-call" class="btn-call" onclick="makeCall()">Llamar</button>
        <button id="btn-hangup" class="btn-hangup" onclick="hangUp()">Finalizar Llamada</button>
        
        <div id="status">Conectado a la red</div>
        <div id="audios"></div>
    </div>
</div>

<!-- Librería PeerJS -->
<script src="https://unpkg.com"></script>

<script>
    const statusDiv = document.getElementById('status');
    const audioContainer = document.getElementById('audios');
    const btnCall = document.getElementById('btn-call');
    const btnHangup = document.getElementById('btn-hangup');
    
    let localStream;
    let peer;
    let currentCall; // Guardamos la llamada activa aquí

    async function activarMicofono() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('setup-step').style.display = 'none';
            document.getElementById('main-step').style.display = 'block';
            inicializarPeer();
        } catch (err) {
            alert("Error: Debes permitir el micrófono para usar la app.");
        }
    }

    function inicializarPeer() {
        peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('call', (call) => {
            if(confirm("¿Aceptar llamada entrante?")) {
                call.answer(localStream);
                gestionarStream(call);
            }
        });
    }

    function makeCall() {
        const rId = document.getElementById('remote-id').value;
        if (!rId) return alert("Ingresa un ID");
        
        const call = peer.call(rId, localStream);
        gestionarStream(call);
    }

    function gestionarStream(call) {
        currentCall = call; // Registramos la llamada actual
        
        // Cambiamos los botones
        btnCall.style.display = "none";
        btnHangup.style.display = "block";

        call.on('stream', (remoteStream) => {
            if (document.getElementById("remote-audio")) return;

            const audio = document.createElement('audio');
            audio.id = "remote-audio";
            audio.srcObject = remoteStream;
            audio.autoplay = true;
            audio.setAttribute('playsinline', 'true');
            audioContainer.appendChild(audio);
            statusDiv.innerText = "En llamada...";
        });

        // Si el otro cuelga:
        call.on('close', () => {
            limpiarLlamada();
        });
    }

    function hangUp() {
        if (currentCall) {
            currentCall.close(); // Cerramos la conexión P2P
            limpiarLlamada();
        }
    }

    function limpiarLlamada() {
        // Borrar el audio de la pantalla
        const audioEl = document.getElementById("remote-audio");
        if (audioEl) audioEl.remove();

        // Resetear botones
        btnCall.style.display = "block";
        btnHangup.style.display = "none";
        statusDiv.innerText = "Llamada finalizada.";
        currentCall = null;
    }
</script>
</body>
</html>
